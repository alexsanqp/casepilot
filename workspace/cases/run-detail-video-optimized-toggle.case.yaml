name: run-detail-video-optimized-toggle
url: /
steps:
  - Click the "casepilot" project name on its project card
  - Click the case name link "projects-list" in the table
  - Wait for the "Run history" section on the case detail page
  - Open a finished run that has both an original and an optimized video
  - Wait for the "Video" section with the "original" and "optimized" toggle buttons to appear
  - Click the "optimized" button
  - Click the "original" button
expect:
  - The "optimized" button became highlighted when selected and the video source switched
  - Switching back to "original" shows the step timeline markers below the video again
  - The "Download video" link is present in both modes
