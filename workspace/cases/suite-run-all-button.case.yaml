name: suite-run-all-button
url: /
steps:
  - Click the "casepilot" project name on its project card
  - Wait for the "Cases" heading and the cases table to appear
  - Hover over the "Run all" button shown above the cases table
expect:
  - A "Run all" button is shown above the cases table
  - The "Run all" button is enabled with the tooltip "Replay every recorded case as one suite"
