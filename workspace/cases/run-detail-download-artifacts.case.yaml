name: run-detail-download-artifacts
url: /
steps:
  - Click the "casepilot" project name on its project card
  - Click the case name link "cases-list" in the table
  - Wait for the "Run history" section on the case detail page
  - Click the first finished row in the run history table
  - Wait for the PASS or FAIL banner to appear
  - Click the "Download artifacts" button in the banner
expect:
  - The "Download artifacts" button points to the run archive endpoint and triggers a zip download
  - The run detail page stays open after the download starts
