name: run-start-replay
url: /
steps:
  - Click the "casepilot" project name on its project card
  - Wait for the cases table to appear
  - Click the case name link "projects-list" in the table
  - Wait for the case detail page with the "projects-list" heading
  - Click the "Run" button in the action bar
  - Wait until a new row appears at the top of the "Run history" table
expect:
  - The page stayed on the case detail page after clicking Run
  - The newest run history row shows a "replay" mode badge and status "running…" or a finished status
