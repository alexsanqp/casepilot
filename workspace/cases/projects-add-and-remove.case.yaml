name: projects-add-and-remove
url: /
steps:
  - Scroll down to the "Add project" section
  - Type "selftest-temp" into the "Name" input of the add project form
  - Type "C:\DISK_D\Projects\casepilot\packages" into the "Absolute path" input
  - Click the "Add project" button
  - Wait for a project card named "selftest-temp" to appear in the project grid
  - Click the button named "Remove project selftest-temp" on the "selftest-temp" project card
  - Accept the browser confirmation dialog that asks to remove the project from the registry
expect:
  - The "selftest-temp" project card is no longer visible in the project grid
  - The "casepilot" and "demo-workspace" project cards are still visible
