name: run-detail-collapsibles
url: /
steps:
  - Click the "casepilot" project name on its project card
  - Click the case name link "cases-list" in the table
  - Wait for the "Run history" section on the case detail page
  - Click the first finished row in the run history table
  - Expand the "Transcript" collapsible section
  - Expand the "Replay JSON" collapsible section
  - Click the "case cases-list" link in the page header
expect:
  - The Transcript section loaded text content into a code block after expanding
  - The Replay JSON section showed either the replay JSON or the message "No replay recorded for this case."
  - The "case cases-list" link navigated back to the case detail page
