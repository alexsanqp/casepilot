name: run-detail-collapsibles
url: /
steps:
  - Click the "demo-workspace" project name on its project card
  - Click the "Runs" link in the sidebar navigation
  - Wait for the runs table to appear
  - Click the first finished run row in the runs table
  - Expand the "Transcript" collapsible section
  - Expand the "Replay JSON" collapsible section
  - Click the "← All runs" link in the page header
expect:
  - The Transcript section loaded text content into a code block after expanding
  - The Replay JSON section showed either the replay JSON or the message "No replay recorded for this case."
  - The "← All runs" link navigated back to the runs table
