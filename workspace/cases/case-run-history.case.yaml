name: case-run-history
url: /
steps:
  - Click the "casepilot" project name on its project card
  - Wait for the cases table to appear
  - Click the case name link "cases-list" in the table
  - Wait for the case detail page with the "cases-list" heading
  - Scroll to the "Run history" section
  - Click the first row in the run history table
expect:
  - The run history table has columns "Run", "Mode", "Provider", "Status", "Verdict", "Duration" and "Started"
  - Run history rows show a short run id, a mode badge and a verdict badge, newest run first
  - Clicking a history row opened the run detail page with a "case cases-list" link back to the case
