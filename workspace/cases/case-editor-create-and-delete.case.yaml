name: case-editor-create-and-delete
url: /
steps:
  - Click the "demo-workspace" project name on its project card
  - Click the "New case" button in the Cases page header
  - Wait for the "New case" heading and the editor to appear
  - Type "selftest-editor-temp" into the "Name" input
  - 'Verify the "Spec YAML" textarea is pre-filled with a template starting with "name: my-case"'
  - Click the "Save" button
  - Wait for the case detail page with the "selftest-editor-temp" heading and the "Definition" section
  - Click the "Delete" button in the action bar at the top of the case detail page and accept the confirmation dialog
  - Wait for the cases table to appear
expect:
  - After Save the page navigated to the detail page for "selftest-editor-temp" with Definition, Replay and Run history sections
  - After Delete the page navigated back to the cases table, which no longer contains a row named "selftest-editor-temp"
  - The row for "example" is still present
