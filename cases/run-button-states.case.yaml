name: run-button-states
url: http://localhost:7701/
steps:
  - Click the "demo-workspace" project name on its project card
  - Wait for the cases table to appear
  - Hover over the disabled "Run" button in the row for the case "example"
  - Hover over the enabled "Run" button in the row for the case "sprset46-project-tag-limit"
expect:
  - The "Run" button for "example" is disabled with the tooltip "No replay recorded yet"
  - The "Run" button for "sprset46-project-tag-limit" is enabled with the tooltip "Replay the recorded steps"
  - Each case row has a provider dropdown next to the Record button
