name: runs-list
url: http://localhost:7701/
steps:
  - Click the "demo-workspace" project name on its project card
  - Click the "Runs" link in the sidebar navigation
  - Wait for the "Runs" heading and the runs table to appear
  - Click the "Refresh" button in the page header
expect:
  - The runs table has columns "Run", "Case", "Mode", "Provider", "Status", "Verdict", "Duration" and "Started"
  - Each run row shows a short run id, a mode badge and a verdict badge
  - The table still renders after clicking Refresh
