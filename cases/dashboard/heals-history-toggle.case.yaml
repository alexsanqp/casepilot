name: heals-history-toggle
url: http://localhost:7701/
steps:
  - Click the "demo-workspace" project name on its project card
  - Click the "Heals" link in the sidebar navigation
  - Wait for the "Heals" heading to appear
  - Check the "History" checkbox in the page header
  - Wait for the list to refresh
expect:
  - With History on, resolved heals appear with an "approved" or "rejected" status badge instead of Approve/Reject buttons, or the page shows "No heals recorded yet."
  - Resolved heal cards show a resolution timestamp next to the status badge
