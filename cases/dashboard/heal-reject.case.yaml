name: heal-reject
url: http://localhost:7701/
steps:
  - Click the "demo-workspace" project name on its project card
  - Click the "Heals" link in the sidebar navigation
  - Wait for the "Heals" heading and at least one pending heal card to appear
  - Note the number of pending heal cards
  - Click the "Reject" button on the first pending heal card
  - Wait for the list to refresh
expect:
  - The rejected heal card is removed from the pending list
  - The number of pending heal cards decreased by one
